# -------------------------------------------------------------------
# 1. NAVIGATION MENU ITEM
# -------------------------------------------------------------------
apiVersion: widgets.templates.krateo.io/v1beta1
kind: NavMenuItem
metadata:
  name: {{ .Release.Name }}-cnpg-nav
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    allowedResources:
      - pages
    resourceRefId: {{ .Release.Name }}-cnpg-page
    label: CNPG Cluster
    icon: fa-database
    path: /cnpg/{{ .Release.Name }}
    order: 160
  resourcesRefs:
    items:
      - id: {{ .Release.Name }}-cnpg-page
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: {{ .Release.Name }}-cnpg-page
        namespace: {{ .Release.Namespace }}
        resource: pages
        verb: GET
---
# -------------------------------------------------------------------
# 2. MAIN PAGE & MAIN WRAPPER
# -------------------------------------------------------------------
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Page
metadata:
  name: {{ .Release.Name }}-cnpg-page
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    title: "CNPG Cluster: {{ .Release.Name }}"
    allowedResources:
      - rows
    items:
      - resourceRefId: {{ .Release.Name }}-cnpg-main-row
  resourcesRefs:
    items:
      - id: {{ .Release.Name }}-cnpg-main-row
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: rows
        name: {{ .Release.Name }}-cnpg-main-row
        namespace: {{ .Release.Namespace }}
        verb: GET
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Row
metadata:
  name: {{ .Release.Name }}-cnpg-main-row
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    allowedResources:
      - panels
    items:
      - resourceRefId: {{ .Release.Name }}-cnpg-main-panel
        size: 24
  resourcesRefs:
    items:
      - id: {{ .Release.Name }}-cnpg-main-panel
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: panels
        name: {{ .Release.Name }}-cnpg-main-panel
        namespace: {{ .Release.Namespace }}
        verb: GET
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Panel
metadata:
  name: {{ .Release.Name }}-cnpg-main-panel
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    actions: {}
    title: "Cluster Overview"
    icon:
      name: "fa-server"
      color: "blue"
    items:
      - resourceRefId: {{ .Release.Name }}-cnpg-kpi-row
      - resourceRefId: {{ .Release.Name }}-cnpg-tables-row
  resourcesRefs:
    items:
      - id: {{ .Release.Name }}-cnpg-kpi-row
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: rows
        name: {{ .Release.Name }}-cnpg-kpi-row
        namespace: {{ .Release.Namespace }}
        verb: GET
      - id: {{ .Release.Name }}-cnpg-tables-row
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: rows
        name: {{ .Release.Name }}-cnpg-tables-row
        namespace: {{ .Release.Namespace }}
        verb: GET
---
# -------------------------------------------------------------------
# 3. MAIN LAYOUT GRID
# -------------------------------------------------------------------
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Row
metadata:
  name: {{ .Release.Name }}-cnpg-kpi-row
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    allowedResources:
      - columns
    items:
      - resourceRefId: {{ .Release.Name }}-cnpg-kpi-col-left
        size: 8
      - resourceRefId: {{ .Release.Name }}-cnpg-kpi-col-right
        size: 16
  resourcesRefs:
    items:
      - id: {{ .Release.Name }}-cnpg-kpi-col-left
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: columns
        name: {{ .Release.Name }}-cnpg-kpi-col-left
        namespace: {{ .Release.Namespace }}
        verb: GET
      - id: {{ .Release.Name }}-cnpg-kpi-col-right
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: columns
        name: {{ .Release.Name }}-cnpg-kpi-col-right
        namespace: {{ .Release.Namespace }}
        verb: GET
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Column
metadata:
  name: {{ .Release.Name }}-cnpg-kpi-col-left
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    allowedResources:
      - panels
    items:
      - resourceRefId: {{ .Release.Name }}-cnpg-panel-phase
      - resourceRefId: {{ .Release.Name }}-cnpg-panel-primary
  resourcesRefs:
    items:
      - id: {{ .Release.Name }}-cnpg-panel-phase
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: panels
        name: {{ .Release.Name }}-cnpg-panel-phase
        namespace: {{ .Release.Namespace }}
        verb: GET
      - id: {{ .Release.Name }}-cnpg-panel-primary
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: panels
        name: {{ .Release.Name }}-cnpg-panel-primary
        namespace: {{ .Release.Namespace }}
        verb: GET
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Column
metadata:
  name: {{ .Release.Name }}-cnpg-kpi-col-right
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    allowedResources:
      - panels
    items:
      - resourceRefId: {{ .Release.Name }}-cnpg-panel-instances
  resourcesRefs:
    items:
      - id: {{ .Release.Name }}-cnpg-panel-instances
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: panels
        name: {{ .Release.Name }}-cnpg-panel-instances
        namespace: {{ .Release.Namespace }}
        verb: GET
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Row
metadata:
  name: {{ .Release.Name }}-cnpg-tables-row
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    allowedResources:
      - tables
    items:
      - resourceRefId: {{ .Release.Name }}-cnpg-table-conditions
        size: 24
  resourcesRefs:
    items:
      - id: {{ .Release.Name }}-cnpg-table-conditions
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: tables
        name: {{ .Release.Name }}-cnpg-table-conditions
        namespace: {{ .Release.Namespace }}
        verb: GET
---
# -------------------------------------------------------------------
# 4. KPI PANELS & CHARTS
# -------------------------------------------------------------------
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Panel
metadata:
  name: {{ .Release.Name }}-cnpg-panel-phase
  namespace: {{ .Release.Namespace }}
spec:
  apiRef:
    name: {{ .Release.Name }}-cnpg-get-cluster
    namespace: {{ .Release.Namespace }}
  widgetData:
    actions: {}
    title: "Cluster Phase"
    icon:
      name: "fa-heartbeat"
      color: "red"
    headerLeft: "-"
    items: []
  widgetDataTemplate:
    - forPath: headerLeft
      expression: >
        ${ .status.phase }
  resourcesRefs:
    items: []
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Panel
metadata:
  name: {{ .Release.Name }}-cnpg-panel-primary
  namespace: {{ .Release.Namespace }}
spec:
  apiRef:
    name: {{ .Release.Name }}-cnpg-get-cluster
    namespace: {{ .Release.Namespace }}
  widgetData:
    actions: {}
    title: "Current Primary"
    icon:
      name: "fa-star"
      color: "violet"
    headerLeft: "-"
    items: []
  widgetDataTemplate:
    - forPath: headerLeft
      expression: >
        ${ .status.currentPrimary }
  resourcesRefs:
    items: []
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Panel
metadata:
  name: {{ .Release.Name }}-cnpg-panel-instances
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    actions: {}
    title: "Instances Overview"
    icon:
      name: "fa-server"
      color: "orange"
    items:
      - resourceRefId: {{ .Release.Name }}-cnpg-instances-inner-row
  resourcesRefs:
    items:
      - id: {{ .Release.Name }}-cnpg-instances-inner-row
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: rows
        name: {{ .Release.Name }}-cnpg-instances-inner-row
        namespace: {{ .Release.Namespace }}
        verb: GET
---
# The inner row wraps the Chart and Table in the same panel
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Row
metadata:
  name: {{ .Release.Name }}-cnpg-instances-inner-row
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    allowedResources:
      - piecharts
      - tables
    items:
      - resourceRefId: {{ .Release.Name }}-cnpg-piechart-instances
        size: 8
      - resourceRefId: {{ .Release.Name }}-cnpg-table-instances
        size: 16
  resourcesRefs:
    items:
      - id: {{ .Release.Name }}-cnpg-piechart-instances
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: piecharts
        name: {{ .Release.Name }}-cnpg-piechart-instances
        namespace: {{ .Release.Namespace }}
        verb: GET
      - id: {{ .Release.Name }}-cnpg-table-instances
        apiVersion: widgets.templates.krateo.io/v1beta1
        resource: tables
        name: {{ .Release.Name }}-cnpg-table-instances
        namespace: {{ .Release.Namespace }}
        verb: GET
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: PieChart
metadata:
  name: {{ .Release.Name }}-cnpg-piechart-instances
  namespace: {{ .Release.Namespace }}
spec:
  apiRef:
    name: {{ .Release.Name }}-cnpg-get-cluster
    namespace: {{ .Release.Namespace }}
  widgetData:
    title: "Replicas Status"
    description: ""
    series:
      total: 0
      data: []
  widgetDataTemplate:
    - forPath: series
      expression: >
        ${
          {
            total: .spec.instances,
            data: [
              {
                color: "green",
                value: (.status.readyInstances // 0),
                label: "Ready"
              },
              {
                color: "gray",
                value: (.spec.instances - (.status.readyInstances // 0)),
                label: "Pending"
              }
            ]
          }
        }
---
# -------------------------------------------------------------------
# 5. TABLES
# -------------------------------------------------------------------
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Table
metadata:
  name: {{ .Release.Name }}-cnpg-table-instances
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    allowedResources: []
    data: []
    columns:
      - valueKey: name
        title: Instance Name
      - valueKey: ip
        title: IP Address
      - valueKey: isPrimary
        title: Is Primary?
  widgetDataTemplate:
    - forPath: data
      expression: "${ .items }"
  apiRef:
    name: {{ .Release.Name }}-cnpg-get-instances
    namespace: {{ .Release.Namespace }}
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Table
metadata:
  name: {{ .Release.Name }}-cnpg-table-conditions
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    allowedResources: []
    data: []
    columns:
      - valueKey: type
        title: Type
      - valueKey: status
        title: Status
      - valueKey: message
        title: Message
  widgetDataTemplate:
    - forPath: data
      expression: "${ .items }"
  apiRef:
    name: {{ .Release.Name }}-cnpg-get-conditions
    namespace: {{ .Release.Namespace }}
---
# -------------------------------------------------------------------
# 6. RESTACTIONS (Data Fetchers)
# -------------------------------------------------------------------
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: {{ .Release.Name }}-cnpg-get-instances
  namespace: {{ .Release.Namespace }}
spec:
  api:
    - name: cluster
      path: /apis/postgresql.cnpg.io/v1/namespaces/{{ .Release.Namespace }}/clusters/{{ .Release.Name }}-pg-cluster
  filter: >
    {
      "items": (
        if .cluster.status.instancesReportedState then
          .cluster.status.instancesReportedState | to_entries | map([
            {"valueKey": "name", "kind": "jsonSchemaType", "type": "string", "stringValue": .key},
            {"valueKey": "ip", "kind": "jsonSchemaType", "type": "string", "stringValue": .value.ip},
            {"valueKey": "isPrimary", "kind": "jsonSchemaType", "type": "string", "stringValue": (.value.isPrimary | tostring)}
          ])
        else
          []
        end
      )
    }
---
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: {{ .Release.Name }}-cnpg-get-conditions
  namespace: {{ .Release.Namespace }}
spec:
  api:
    - name: cluster
      path: /apis/postgresql.cnpg.io/v1/namespaces/{{ .Release.Namespace }}/clusters/{{ .Release.Name }}-pg-cluster
  filter: >
    {
      "items": (
        if .cluster.status.conditions then
          .cluster.status.conditions | map([
            {"valueKey": "type", "kind": "jsonSchemaType", "type": "string", "stringValue": .type},
            {"valueKey": "status", "kind": "jsonSchemaType", "type": "string", "stringValue": .status},
            {"valueKey": "message", "kind": "jsonSchemaType", "type": "string", "stringValue": .message}
          ])
        else
          []
        end
      )
    }
---
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: {{ .Release.Name }}-cnpg-get-cluster
  namespace: {{ .Release.Namespace }}
spec:
  api:
    - name: cluster
      path: /apis/postgresql.cnpg.io/v1/namespaces/{{ .Release.Namespace }}/clusters/{{ .Release.Name }}-pg-cluster
      verb: GET
  # Unwrap the result so that we output the raw cluster object
  filter: ".cluster"