# -------------------------------------------------------------------
# 7. RESTACTIONS (Data Fetchers)
# -------------------------------------------------------------------
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: {{ .Release.Name }}-logs-get-pod-1
  namespace: {{ .Release.Namespace }}
spec:
  api:
    - name: podList
      path: "/api/v1/namespaces/{{ .Release.Namespace }}/pods?labelSelector=app%3D{{ .Release.Name }}-backend&limit=1"
      verb: GET
      endpointRef:
        name: portal-admin-page-endpoint
        namespace: krateo-system
      continueOnError: true
      errorKey: listErr
    - name: logs
      path: "/api/v1/namespaces/{{ .Release.Namespace }}/pods/${podList.items[0].metadata.name}/log?tailLines=100"
      verb: GET
      endpointRef:
        name: portal-admin-page-endpoint
        namespace: krateo-system
      continueOnError: true
      errorKey: err
  filter: |
    { response: (if (.err or .listErr) then null else .logs end) }
---
