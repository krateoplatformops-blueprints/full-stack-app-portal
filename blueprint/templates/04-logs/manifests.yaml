  namespace: {{ .Release.Namespace }}
spec:
  apiRef:
    name: {{ .Release.Name }}-logs-get-pod-1
    namespace: {{ .Release.Namespace }}
  widgetData:
    markdown: "Loading logs..."
    allowCopy: true
    allowDownload: true
    downloadFileExtension: "txt"
  widgetDataTemplate:
    - forPath: markdown
      expression: >
        ${ if .response then "```\n" + .response.logs + "\n```" else "⚠️ **Logs could not be retrieved.**" end }
