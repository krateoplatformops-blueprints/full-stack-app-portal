# -------------------------------------------------------------------
apiVersion: widgets.templates.krateo.io/v1beta1
kind: NavMenuItem
metadata:
  name: {{ .Release.Name }}-logs-nav
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    allowedResources:
      - pages
    resourceRefId: {{ .Release.Name }}-logs-page
    label: App Logs
    icon: fa-terminal
    path: /logs
    order: 130
  resourcesRefs:
